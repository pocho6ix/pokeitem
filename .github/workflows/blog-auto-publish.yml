name: Auto Publish Blog Post
on:
  schedule:
    - cron: '0 8 * * 1,3,5'  # Lundi, Mercredi, Vendredi à 8h UTC
  workflow_dispatch:
    inputs:
      topic:
        description: "Sujet de l'article"
        required: false

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci

      - name: Generate Article via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: node scripts/generate-blog-post.js

      - name: Commit & Push
        run: |
          git config user.name "PokeItem Bot"
          git config user.email "bot@pokeitem.fr"
          git add content/blog/
          git diff --cached --quiet && echo "No new content" && exit 0
          git commit -m "Auto-publish: new blog post"
          git push

      - name: Trigger Vercel Deploy
        if: env.VERCEL_DEPLOY_HOOK != ''
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: curl -X POST "$VERCEL_DEPLOY_HOOK"
